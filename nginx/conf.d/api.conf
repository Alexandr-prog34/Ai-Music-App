upstream api_backend {
    server api:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
    proxy_connect_timeout 3s;
    proxy_send_timeout 15s;
    proxy_read_timeout 15s;

    location = /health {
        if ($request_method != GET) {
            return 405;
        }
        access_log off;
        proxy_pass http://api_backend;
    }

    location = /ready {
        if ($request_method != GET) {
            return 405;
        }
        access_log off;
        proxy_pass http://api_backend;
    }

    location /api/v1/ {
        limit_req zone=per_ip_general burst=20 nodelay;
        limit_conn per_ip_conn 20;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 90s;
        rewrite ^/api/v1(/.*)$ $1 break;
        proxy_pass http://api_backend;
    }

    location = /jobs {
        if ($request_method !~ ^(GET|POST)$) {
            return 405;
        }

        limit_req zone=jobs_by_ip burst=3 nodelay;
        limit_req zone=per_ip_general burst=20 nodelay;
        limit_conn per_ip_conn 20;
        proxy_pass http://api_backend;
    }

    location /jobs/ {
        if ($request_method != GET) {
            return 405;
        }

        limit_req zone=per_ip_general burst=20 nodelay;
        limit_conn per_ip_conn 20;
        proxy_pass http://api_backend;
    }

    location = /tracks {
        if ($request_method != GET) {
            return 405;
        }

        limit_req zone=per_ip_general burst=20 nodelay;
        limit_conn per_ip_conn 20;
        proxy_pass http://api_backend;
    }

    location ~ ^/tracks/[^/]+$ {
        if ($request_method !~ ^(GET|DELETE)$) {
            return 405;
        }

        limit_req zone=per_ip_general burst=20 nodelay;
        limit_conn per_ip_conn 20;
        proxy_pass http://api_backend;
    }

    location ~ ^/tracks/[^/]+/favorite$ {
        if ($request_method !~ ^(PUT|DELETE)$) {
            return 405;
        }

        limit_req zone=per_ip_general burst=20 nodelay;
        limit_conn per_ip_conn 20;
        proxy_pass http://api_backend;
    }

    location ~ ^/tracks/[^/]+/download$ {
        if ($request_method != GET) {
            return 405;
        }

        limit_req zone=per_ip_general burst=20 nodelay;
        limit_conn per_ip_conn 20;
        proxy_pass http://api_backend;
    }

    location = /ws {
        if ($request_method != GET) {
            return 405;
        }

        limit_conn per_ip_conn 20;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 90s;
        proxy_pass http://api_backend;
    }

    location = /suno/callback {
        if ($request_method != POST) {
            return 405;
        }

        limit_req zone=per_ip_general burst=30 nodelay;
        limit_conn per_ip_conn 20;
        proxy_pass http://api_backend;
    }

    location = /internal/suno/callback {
        if ($request_method != POST) {
            return 405;
        }

        limit_req zone=per_ip_general burst=30 nodelay;
        limit_conn per_ip_conn 20;
        proxy_pass http://api_backend;
    }

    location / {
        return 404;
    }
}

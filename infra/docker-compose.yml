services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - ../.env
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "8080:8080"

  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - ../.env
    depends_on:
      - redis
      - postgres
      - minio

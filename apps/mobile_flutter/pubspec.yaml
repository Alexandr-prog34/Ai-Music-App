name: mobile_flutter

description: Ai Music Generator mobile app
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.5.1

  go_router: ^14.2.7

  dio: ^5.9.1
  pretty_dio_logger: ^1.4.0
  google_fonts: ^6.3.2
  audioplayers: ^6.6.0

  flutter_secure_storage: ^9.2.2
  uuid: ^4.5.1

  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  intl: ^0.19.0

  web_socket_channel: ^3.0.3
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

  fonts:
    - family: NicoMoji
      fonts:
        - asset: assets/fonts/NicoMoji-Regular.ttf

    - family: Monoton
      fonts:
        - asset: assets/fonts/Monoton-Regular.ttf

    - family: Jura
      fonts:
        - asset: assets/fonts/Jura-Regular.ttf

    - family: Faustina
      fonts:
        - asset: assets/fonts/Faustina-Regular.ttf

    - family: FredokaOne
      fonts:
        - asset: assets/fonts/FredokaOne-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/icon.png
  remove_alpha_ios: true
